name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Run Fish shell tests
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        fish-version: ['3.1', '3.2']

    steps:
      - uses: actions/checkout@v3

      - uses: fish-actions/install-fish@v1
        with:
          version: ${{ matrix.fish-version }}

      - name: Run test suite
        run: |
          echo "Running my-fish-tools tests..."
          for test in tests/*_test.fish; do
            echo "📋 Running $(basename $test)..."
            fish "$test" || exit 1
          done
          echo "✅ All tests passed!"
        timeout-minutes: 5

  # Syntax check all Fish files
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: fish-actions/install-fish@v1

      - uses: fish-actions/syntax-check@v1

  # Format check Fish files
  format-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: fish-actions/install-fish@v1

      - uses: fish-actions/format-check@v1


